services:
  oncosml:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "main.py", "run-service", "--sleep-seconds", "300"]
    environment:
      SML_LOG_LEVEL: INFO
      SML_STATUS_HOST: 0.0.0.0
      SML_STATUS_PORT: 8787
    ports:
      - "8787:8787"
    volumes:
      - ./outputs:/app/outputs
      - ./model_store:/app/model_store

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["streamlit", "run", "dashboard.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    environment:
      SML_LOG_LEVEL: INFO
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
      - ./model_store:/app/model_store
    depends_on:
      - oncosml
