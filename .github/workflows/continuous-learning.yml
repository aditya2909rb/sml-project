name: OncoSML Continuous Learning

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: sml-continuous-learning
  cancel-in-progress: false

jobs:
  train-hosted-cycle:
    runs-on: ubuntu-latest
    env:
      SML_PERSIST_ENABLED: "true"
      SML_STATE_BRANCH: sml-state
      SML_PERSIST_EVERY_CYCLES: "1"
      SML_PERSIST_MIN_BATCH_ACCURACY: "0.0"
      SML_PERSIST_RECENT_WINDOW: "1"
      SML_PERSIST_RECENT_MIN_AVG_ACCURACY: "0.0"
      SML_PERSIST_MIN_TRAINED_SAMPLES: "0"
      SML_HN_ENABLED: "true"
      SML_REDDIT_ENABLED: "true"
      SML_ARXIV_ENABLED: "true"
      SML_SOURCE_ALLOWLIST: ""
      SML_SOURCE_BLOCKLIST: ""
      SML_FEEDS: "https://feeds.bbci.co.uk/news/rss.xml,https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml,https://www.theverge.com/rss/index.xml,https://hnrss.org/frontpage,https://www.reddit.com/r/MachineLearning/.rss"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore persisted state from branch
        run: |
          if git ls-remote --exit-code --heads origin "$SML_STATE_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$SML_STATE_BRANCH"
            git checkout "origin/$SML_STATE_BRANCH" -- sml_state.sqlite3 model_store || true
          else
            echo "No persisted state branch found yet; starting fresh."
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config user.email "sml-bot@users.noreply.github.com"
          git config user.name "sml-bot"

      - name: Run one SML cycle
        run: |
          python main.py run-once

      - name: Write training summary
        run: |
          python - <<'PY'
          import os
          import sqlite3
          from pathlib import Path

          db = Path("sml_state.sqlite3")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          restored = "not found"
          if db.exists():
            restored = db.stat().st_mtime

          lines = [
            "## SML Hosted Cycle Summary",
            "",
            f"- Restored state timestamp (unix): {restored}",
          ]

          if db.exists():
            conn = sqlite3.connect(str(db))
            conn.row_factory = sqlite3.Row
            try:
              latest = conn.execute(
                """
                SELECT cycle_id, ts, n_features, estimated_params, target_params, scaled_up, scale_note
                FROM model_progress
                ORDER BY id DESC
                LIMIT 1
                """
              ).fetchone()
              if latest is not None:
                estimated = int(latest["estimated_params"])
                target = max(1, int(latest["target_params"]))
                pct = (estimated / target) * 100.0
                lines.extend(
                  [
                    f"- Current estimated parameters: {estimated}",
                    f"- Progress to target: {pct:.8f}%",
                    f"- Latest model-progress timestamp: {latest['ts']}",
                    f"- Last scaling note: {latest['scale_note']}",
                  ]
                )
              else:
                lines.append("- No model progress rows found yet.")
            finally:
              conn.close()
          else:
            lines.append("- Database not found after cycle.")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Build monitor dashboard files
        run: |
          python scripts/build_monitor_dashboard.py --db sml_state.sqlite3 --out-dir monitor

      - name: Upload monitor dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: monitor-dashboard
          path: monitor
          if-no-files-found: error

      - name: Upload learning db
        uses: actions/upload-artifact@v4
        with:
          name: sml-state
          path: sml_state.sqlite3
          if-no-files-found: warn

      - name: Upload model store
        uses: actions/upload-artifact@v4
        with:
          name: sml-model-store
          path: model_store
          if-no-files-found: warn

  train-self-hosted-continuous:
    if: vars.SML_USE_SELF_HOSTED == 'true' && github.event_name == 'push'
    runs-on: self-hosted
    env:
      SML_PERSIST_ENABLED: "true"
      SML_STATE_BRANCH: sml-state
      SML_PERSIST_EVERY_CYCLES: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config user.email "sml-bot@users.noreply.github.com"
          git config user.name "sml-bot"

      - name: Start continuous loop
        run: |
          python main.py run-loop --sleep-seconds 30
