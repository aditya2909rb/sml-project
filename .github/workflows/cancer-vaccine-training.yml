name: Cancer Vaccine AI Training Pipeline

on:
  # Trigger on push to main branch
  push:
    branches: [ main ]
  
  # Trigger on pull request to main branch
  pull_request:
    branches: [ main ]
  
  # Schedule: Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      training_mode:
        description: 'Training mode'
        required: true
        default: 'full'
        type: choice
        options:
        - full
        - quick
        - github_only
      max_studies:
        description: 'Maximum studies to download'
        required: false
        default: '5'
        type: string

jobs:
  setup-and-download:
    name: Setup Environment and Download Data
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for proper state management
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          curl \
          wget \
          build-essential
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create data directories
      run: |
        mkdir -p data/cbioportal/raw
        mkdir -p data/cbioportal/processed
        mkdir -p model_store
        mkdir -p logs
    
    - name: Download cBioPortal data
      env:
        TRAINING_MODE: ${{ github.event.inputs.training_mode || 'full' }}
        MAX_STUDIES: ${{ github.event.inputs.max_studies || '5' }}
      run: |
        echo "Training mode: $TRAINING_MODE"
        echo "Max studies: $MAX_STUDIES"
        
        # Run cBioPortal data download
        python scripts/download_cbioportal_data.py
        
        # Check if download was successful
        if [ -f "data/cbioportal/processed/combined_training_dataset.json" ]; then
          echo "cBioPortal data download completed successfully"
          echo "DATASET_EXISTS=true" >> $GITHUB_ENV
        else
          echo "cBioPortal data download failed or no data available"
          echo "DATASET_EXISTS=false" >> $GITHUB_ENV
        fi
    
    - name: Upload cBioPortal data as artifact
      if: env.DATASET_EXISTS == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: cbioportal-dataset
        path: data/cbioportal/
        retention-days: 30

  github-training:
    name: GitHub Repository Training
    runs-on: ubuntu-latest
    needs: setup-and-download
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run GitHub training
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TRAINING_MODE: ${{ github.event.inputs.training_mode || 'full' }}
      run: |
        # Create a simple script to run GitHub training
        cat > run_github_training.py << 'EOF'
import asyncio
import sys
import os
sys.path.append('sml')
from github_trainer import GitHubTrainer

async def main():
    trainer = GitHubTrainer()
    samples = await trainer.train_from_github(max_repos=10, max_files_per_repo=5)
    print(f"Trained on {len(samples)} GitHub samples")
    
    if samples:
        insights = trainer.extract_training_insights(samples)
        print(f"Key insights: {insights['most_common_keywords']}")
        print(f"Recommendations: {insights['recommended_improvements']}")
        
        # Save training results
        with open('github_training_results.json', 'w') as f:
            import json
            json.dump(insights, f, indent=2)
        print("GitHub training results saved")

if __name__ == "__main__":
    asyncio.run(main())
EOF
        
        python run_github_training.py
    
    - name: Upload GitHub training results
      uses: actions/upload-artifact@v4
      with:
        name: github-training-results
        path: github_training_results.json
        retention-days: 30

  train-model:
    name: Train Cancer Vaccine Model
    runs-on: ubuntu-latest
    needs: [setup-and-download, github-training]
    if: env.DATASET_EXISTS == 'true'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download cBioPortal dataset
      uses: actions/download-artifact@v4
      with:
        name: cbioportal-dataset
        path: data/cbioportal/
    
    - name: Download GitHub training results
      uses: actions/download-artifact@v4
      with:
        name: github-training-results
        path: .
    
    - name: Train cancer vaccine model
      env:
        TRAINING_MODE: ${{ github.event.inputs.training_mode || 'full' }}
        MAX_STUDIES: ${{ github.event.inputs.max_studies || '5' }}
      run: |
        # Create training script
        cat > train_cancer_vaccine.py << 'EOF'
import json
import sys
import os
sys.path.append('sml')

from cancer_vaccine_model import CancerVaccineModel
from data_ingest import Sample

def load_cbioportal_data():
    """Load cBioPortal training data."""
    dataset_path = 'data/cbioportal/processed/combined_training_dataset.json'
    if not os.path.exists(dataset_path):
        print("No cBioPortal dataset found")
        return []
    
    with open(dataset_path, 'r') as f:
        data = json.load(f)
    
    print(f"Loaded {len(data)} cBioPortal samples")
    return data

def load_github_training():
    """Load GitHub training insights."""
    insights_path = 'github_training_results.json'
    if not os.path.exists(insights_path):
        print("No GitHub training results found")
        return {}
    
    with open(insights_path, 'r') as f:
        insights = json.load(f)
    
    print(f"Loaded GitHub training insights: {len(insights.get('most_common_keywords', {}))} keywords")
    return insights

def prepare_training_data(cbioportal_data, github_insights):
    """Prepare training data for the model."""
    texts = []
    labels = []
    dna_samples = []
    
    # Process cBioPortal data
    for sample in cbioportal_data[:100]:  # Limit to first 100 samples for quick training
        # Create text representation
        patient_info = sample.get('patient_info', {})
        text = f"Cancer type: {patient_info.get('cancer_type', 'Unknown')}. "
        text += f"Age: {patient_info.get('age', 'Unknown')}. "
        text += f"Gender: {patient_info.get('gender', 'Unknown')}. "
        
        # Add mutation information
        mutations = sample.get('mutations', [])
        if mutations:
            text += f"Mutations: {len(mutations)} detected. "
            for mut in mutations[:5]:  # Limit to first 5 mutations
                text += f"{mut.get('gene', 'Unknown')} {mut.get('variant_classification', '')}. "
        
        texts.append(text)
        labels.append(sample.get('label', 1))  # 1 for cancer samples
        
        # Prepare DNA sample for cancer vaccine model
        if mutations:
            dna_sample = {
                'sample_id': sample.get('patient_info', {}).get('sample_id', 'unknown'),
                'normal_dna': 'ATCG' * 100,  # Simplified for demo
                'tumor_dna': 'ATCG' * 100,   # Simplified for demo
                'hla_allele': 'HLA-A*02:01'
            }
            dna_samples.append(dna_sample)
    
    return texts, labels, dna_samples

def main():
    print("Starting cancer vaccine model training...")
    
    # Load data
    cbioportal_data = load_cbioportal_data()
    github_insights = load_github_training()
    
    if not cbioportal_data:
        print("No training data available, skipping training")
        return
    
    # Prepare training data
    texts, labels, dna_samples = prepare_training_data(cbioportal_data, github_insights)
    
    print(f"Training on {len(texts)} text samples and {len(dna_samples)} DNA samples")
    
    # Initialize model
    model = CancerVaccineModel('model_store', n_features=262144)
    
    # Train model
    result = model.train(texts, labels, dna_samples)
    
    print(f"Training completed:")
    print(f"  Trained samples: {result.trained_samples}")
    print(f"  Batch accuracy: {result.batch_accuracy}")
    print(f"  Mutation detection accuracy: {result.mutation_detection_accuracy}")
    print(f"  Neoantigen prediction accuracy: {result.neoantigen_prediction_accuracy}")
    print(f"  Vaccine design score: {result.vaccine_design_score}")
    
    # Save model
    model.save()
    print("Model saved successfully")
    
    # Get model status
    status = model.get_model_status()
    with open('model_training_report.json', 'w') as f:
        json.dump(status, f, indent=2)
    print("Training report saved")

if __name__ == "__main__":
    main()
EOF
        
        python train_cancer_vaccine.py
    
    - name: Upload model and training report
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: |
          model_store/
          model_training_report.json
        retention-days: 90

  continuous-learning:
    name: Continuous Learning Loop
    runs-on: ubuntu-latest
    needs: train-model
    if: github.ref == 'refs/heads/main' && github.event_name == 'schedule'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run continuous learning loop
      run: |
        # Create continuous learning script
        cat > run_continuous_learning.py << 'EOF'
import asyncio
import time
import sys
import os
sys.path.append('sml')

from runner import run_loop
from config import load_config
from pathlib import Path

def main():
    print("Starting continuous learning loop...")
    
    # Load configuration
    config = load_config()
    repo_root = Path(__file__).resolve().parent
    
    # Run one cycle for demonstration
    from runner import run_one_cycle
    run_one_cycle(config=config, repo_root=repo_root)
    
    print("Continuous learning cycle completed")

if __name__ == "__main__":
    main()
EOF
        
        python run_continuous_learning.py
    
    - name: Commit and push learning state
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add any new files (like updated model state)
        git add model_store/ sml_state.sqlite3 || true
        
        # Commit if there are changes
        if ! git diff --cached --quiet; then
          git commit -m "Update learning state from continuous training cycle"
          git push
        else
          echo "No changes to commit"
        fi

  dashboard-deployment:
    name: Deploy Monitoring Dashboard
    runs-on: ubuntu-latest
    needs: train-model
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create dashboard deployment
      run: |
        # Create a simple dashboard deployment script
