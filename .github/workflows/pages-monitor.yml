name: OncoSML Pages Monitor

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["OncoSML Cancer Training Pipeline"]
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Monitor Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Restore latest training state from branch
        env:
          STATE_BRANCH: sml-state
        run: |
          set -euo pipefail
          git fetch origin "$STATE_BRANCH"
          if ! git ls-remote --exit-code --heads origin "$STATE_BRANCH" >/dev/null 2>&1; then
            echo "State branch not found: $STATE_BRANCH"
            exit 1
          fi

          # Force-refresh the DB from the state branch to avoid using stale local copies.
          rm -f sml_state.sqlite3
          if ! git show "origin/$STATE_BRANCH:sml_state.sqlite3" > sml_state.sqlite3; then
            echo "Failed to read sml_state.sqlite3 from origin/$STATE_BRANCH"
            exit 1
          fi

          if [ ! -s sml_state.sqlite3 ]; then
            echo "sml_state.sqlite3 is missing or empty after restore"
            exit 1
          fi

      - name: Build monitor dashboard
        run: |
          python scripts/build_monitor_dashboard.py --db sml_state.sqlite3 --out-dir site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
